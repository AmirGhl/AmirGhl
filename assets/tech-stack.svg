<svg width="1400" height="320" viewBox="0 0 1400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&amp;display=swap');
    .label { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
  </style>
  <defs>
    <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A0F1C" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="cardGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card template repeated with translate groups: React, Next.js, TypeScript, TailwindCSS, Node.js, MongoDB -->

  <g transform="translate(20,20)">
    <rect width="215" height="150" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="150" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,58)" stroke="#61DAFB" stroke-width="2.6" fill="none" filter="url(#iconGlow)">
      <ellipse rx="34" ry="13"/>
      <ellipse rx="34" ry="13" transform="rotate(60)"/>
      <ellipse rx="34" ry="13" transform="rotate(120)"/>
      <circle r="5.5" fill="#61DAFB" stroke="none"/>
    </g>
    <text x="107.5" y="128" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">React</text>
  </g>

  <g transform="translate(255,20)">
    <rect width="215" height="150" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="150" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,58)" filter="url(#iconGlow)">
      <circle r="34" fill="none" stroke="#F8FAFC" stroke-width="2.4"/>
      <path d="M -14 -18 L 14 22 M 14 -18 L 14 22" stroke="#F8FAFC" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    </g>
    <text x="107.5" y="128" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">Next.js</text>
  </g>

  <g transform="translate(490,20)">
    <rect width="215" height="150" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="150" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,58)" filter="url(#iconGlow)">
      <rect x="-32" y="-32" width="64" height="64" rx="12" fill="none" stroke="#3B82F6" stroke-width="2.4"/>
      <text x="0" y="10" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="28" fill="#3B82F6">TS</text>
    </g>
    <text x="107.5" y="128" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">TypeScript</text>
  </g>

  <g transform="translate(725,20)">
    <rect width="215" height="150" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="150" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,58)" filter="url(#iconGlow)">
      <path d="M -30 -6 C -30 -20 -16 -26 0 -18 C -6 -22 -14 -18 -14 -10 C -14 -3 -8 0 0 -2 C 16 -8 30 2 30 16 C 30 30 16 36 0 28 C 8 32 16 26 16 18 C 16 11 10 8 2 10 C -14 16 -30 6 -30 -6 Z"
            fill="#38BDF8" stroke="none"/>
    </g>
    <text x="107.5" y="128" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">TailwindCSS</text>
  </g>

  <g transform="translate(20,190)">
    <rect width="215" height="110" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="110" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,44)" filter="url(#iconGlow)">
      <path d="M0,-26 L23,-13 L23,13 L0,26 L-23,13 L-23,-13 Z" fill="none" stroke="#4ADE80" stroke-width="2.4"/>
      <path d="M0,-26 L0,26 M-23,-13 L23,13 M23,-13 L-23,13" stroke="#4ADE80" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="107.5" y="92" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">Node.js</text>
  </g>

  <g transform="translate(255,190)">
    <rect width="215" height="110" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="110" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,44)" filter="url(#iconGlow)">
      <path d="M0,-26 C16,-14 16,14 0,26 C-16,14 -16,-14 0,-26 Z" fill="none" stroke="#4ADE80" stroke-width="2.4"/>
      <line x1="0" y1="-20" x2="0" y2="26" stroke="#4ADE80" stroke-width="1.6"/>
    </g>
    <text x="107.5" y="92" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">MongoDB</text>
  </g>

  <g transform="translate(490,190)">
    <rect width="215" height="110" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="110" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,44)" filter="url(#iconGlow)">
      <rect x="-26" y="-20" width="52" height="40" rx="6" fill="none" stroke="#F0DB4F" stroke-width="2.2"/>
      <text x="0" y="10" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="20" fill="#F0DB4F">JS</text>
    </g>
    <text x="107.5" y="92" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">JavaScript</text>
  </g>

  <g transform="translate(725,190)">
    <rect width="215" height="110" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="215" height="110" rx="18" fill="url(#cardGlow)"/>
    <g transform="translate(107.5,44)" filter="url(#iconGlow)">
      <circle r="24" fill="none" stroke="#F97316" stroke-width="2.2"/>
      <circle r="4.5" fill="#F97316"/>
      <line x1="0" y1="0" x2="18" y2="-14" stroke="#F97316" stroke-width="2"/>
      <line x1="0" y1="0" x2="-18" y2="14" stroke="#F97316" stroke-width="2"/>
    </g>
    <text x="107.5" y="92" text-anchor="middle" class="label" font-size="15" fill="#F8FAFC">Git</text>
  </g>

  <g transform="translate(960,20)">
    <rect width="420" height="280" rx="18" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="1.2"/>
    <rect width="420" height="280" rx="18" fill="url(#cardGlow)"/>
    <text x="30" y="46" class="label" font-size="15" fill="#94A3B8">CURRENTLY REACHING FOR</text>
    <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#F8FAFC">
      <text x="30" y="90">→ React &amp; Next.js (App Router)</text>
      <text x="30" y="122">→ TypeScript, strict mode always</text>
      <text x="30" y="154">→ TailwindCSS + design tokens</text>
      <text x="30" y="186">→ Node.js services &amp; REST/GraphQL</text>
      <text x="30" y="218">→ MongoDB for product data</text>
      <text x="30" y="250">→ Real-time UIs for trading tools</text>
    </g>
  </g>
</svg>
