<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    .h { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 700; }
    .p { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; }
    .tag { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 500; letter-spacing: 0.04em; }
  </style>
  <defs>
    <linearGradient id="mainCardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1526"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="mainCardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="mainGlow" cx="85%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="cGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <linearGradient id="subCardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0A0F1C" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Main featured project: Traders Royal -->
  <g transform="translate(0,0)">
    <rect width="820" height="360" rx="20" fill="url(#mainCardFill)" stroke="url(#mainCardStroke)" stroke-width="1.4"/>
    <rect width="820" height="360" rx="20" fill="url(#mainGlow)"/>

    <text x="36" y="52" class="tag" font-size="12" fill="#38BDF8">FEATURED · MAIN PROJECT</text>
    <text x="36" y="94" class="h" font-size="30" fill="#F8FAFC">Traders Royal</text>
    <text x="36" y="122" class="p" font-size="15" fill="#94A3B8">Modern social trading platform</text>

    <!-- mini live-chart mock -->
    <g transform="translate(36,150)" filter="url(#cGlow)">
      <path d="M0,90 L60,70 L110,80 L160,45 L220,58 L280,20 L340,38 L400,8 L460,26 L520,0"
            fill="none" stroke="url(#chartLine)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,700;700,0" dur="3s" fill="freeze"/>
      </path>
      <path d="M0,90 L60,70 L110,80 L160,45 L220,58 L280,20 L340,38 L400,8 L460,26 L520,0 L520,110 L0,110 Z"
            fill="#2563EB" opacity="0.12"/>
    </g>

    <g transform="translate(36,268)">
      <rect width="94" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="47" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">React</text>
      <rect x="104" width="98" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="153" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">Next.js</text>
      <rect x="212" width="122" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="273" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">TypeScript</text>
      <rect x="344" width="130" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="409" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">TailwindCSS</text>
      <rect x="484" width="98" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="533" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">Node.js</text>
      <rect x="592" width="112" height="30" rx="15" fill="#111827" stroke="#1E293B"/>
      <text x="648" y="20" text-anchor="middle" class="tag" font-size="11" fill="#93C5FD">MongoDB</text>
    </g>

    <line x1="36" y1="326" x2="784" y2="326" stroke="#1E293B"/>
    <text x="36" y="346" class="p" font-size="12.5" fill="#64748B">Real-time positions, social feeds and portfolio tools in one dark, fast interface.</text>
  </g>

  <!-- Secondary project cards -->
  <g transform="translate(844,0)">
    <rect width="556" height="172" rx="18" fill="url(#subCardFill)" stroke="#1E293B" stroke-width="1.2"/>
    <text x="30" y="42" class="tag" font-size="11" fill="#60A5FA">OPEN SOURCE</text>
    <text x="30" y="74" class="h" font-size="21" fill="#F8FAFC">UI Component Kit</text>
    <text x="30" y="98" class="p" font-size="13" fill="#94A3B8">Accessible React primitives styled with Tailwind,</text>
    <text x="30" y="118" class="p" font-size="13" fill="#94A3B8">built for design-system consistency.</text>
    <g transform="translate(30,134)">
      <rect width="72" height="24" rx="12" fill="#111827" stroke="#1E293B"/>
      <text x="36" y="16" text-anchor="middle" class="tag" font-size="10" fill="#93C5FD">React</text>
      <rect x="80" width="96" height="24" rx="12" fill="#111827" stroke="#1E293B"/>
      <text x="128" y="16" text-anchor="middle" class="tag" font-size="10" fill="#93C5FD">TypeScript</text>
    </g>
  </g>

  <g transform="translate(844,188)">
    <rect width="556" height="172" rx="18" fill="url(#subCardFill)" stroke="#1E293B" stroke-width="1.2"/>
    <text x="30" y="42" class="tag" font-size="11" fill="#60A5FA">PERFORMANCE</text>
    <text x="30" y="74" class="h" font-size="21" fill="#F8FAFC">Market Data Dashboard</text>
    <text x="30" y="98" class="p" font-size="13" fill="#94A3B8">Sub-100ms chart updates using windowed</text>
    <text x="30" y="118" class="p" font-size="13" fill="#94A3B8">rendering and WebSocket streams.</text>
    <g transform="translate(30,134)">
      <rect width="86" height="24" rx="12" fill="#111827" stroke="#1E293B"/>
      <text x="43" y="16" text-anchor="middle" class="tag" font-size="10" fill="#93C5FD">Next.js</text>
      <rect x="94" width="80" height="24" rx="12" fill="#111827" stroke="#1E293B"/>
      <text x="134" y="16" text-anchor="middle" class="tag" font-size="10" fill="#93C5FD">Node.js</text>
    </g>
  </g>
</svg>
