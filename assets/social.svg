  </g>

  <!-- Email -->
  <g transform="translate(440,0)">
    <rect width="180" height="70" rx="20" fill="url(#pillFill)" stroke="url(#pillGlowStroke)" stroke-width="1.2"/>
    <g transform="translate(30,22)" fill="none" stroke="#38BDF8" stroke-width="2">
      <rect x="0" y="0" width="26" height="19" rx="3"/>
