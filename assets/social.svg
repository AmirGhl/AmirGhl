<svg width="620" height="70" viewBox="0 0 620 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');
    .lbl { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; }
  </style>
  <defs>
