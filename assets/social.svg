    </g>
    <text x="80" y="40" class="lbl" font-size="15" fill="#F8FAFC">GitHub</text>
  </g>

  <!-- LinkedIn -->
  <g transform="translate(210,0)">
    <rect width="210" height="70" rx="20" fill="url(#pillFill)" stroke="url(#pillGlowStroke)" stroke-width="1.2"/>
    <g transform="translate(30,20)">
      <rect width="26" height="26" rx="6" fill="#2563EB"/>
      <rect x="6" y="10" width="4.5" height="12" fill="#F8FAFC"/>
