<svg width="1400" height="260" viewBox="0 0 1400 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    .t1 { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -0.01em; }
    .t2 { font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; }
    .m { font-family: 'JetBrains Mono', 'Courier New', monospace; letter-spacing: 0.1em; }
  </style>
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#050B16"/>
    </linearGradient>
    <radialGradient id="fglow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="fblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <clipPath id="fframe"><rect width="1400" height="260" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#fframe)">
    <rect width="1400" height="260" fill="url(#fbg)"/>
    <circle cx="700" cy="0" r="260" fill="url(#fglow)" filter="url(#fblur)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="9s" repeatCount="indefinite"/>
    </circle>

    <line x1="80" y1="40" x2="1320" y2="40" stroke="#1E293B" stroke-width="1"/>

    <text x="700" y="115" text-anchor="middle" class="t1" font-size="30" fill="#F8FAFC">Let's build something precise.</text>
    <text x="700" y="150" text-anchor="middle" class="t2" font-size="15" fill="#94A3B8">Open to collaborations, open source and interesting frontend problems.</text>

    <text x="700" y="205" text-anchor="middle" class="m" font-size="12" fill="#38BDF8">GITHUB.COM/AMIRGHL · AMIRGHLW@GMAIL.COM</text>

    <text x="700" y="238" text-anchor="middle" class="t2" font-size="11" fill="#475569">© 2026 Amir Gholami — crafted with React, TypeScript &amp; care.</text>
  </g>
  <rect x="0.75" y="0.75" width="1398.5" height="258.5" rx="22" fill="none" stroke="#1E293B" stroke-width="1.5"/>
</svg>
